name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  tests:
    uses: ./.github/workflows/tests.yml

  validate:
    uses: ./.github/workflows/validate.yml

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [lint, tests, validate]
    permissions:
      contents: write

    concurrency:
      group: release
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install python-semantic-release
        run: uv tool install python-semantic-release==10.5.3

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic Release — version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Exit code 2 means "no release needed" — treat as success, skip publish
        run: uv tool run --from python-semantic-release semantic-release version
        continue-on-error: true

      - name: Semantic Release — publish
        if: steps.version.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv tool run --from python-semantic-release semantic-release publish
