name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Get Home Assistant version
        id: ha_version
        run: |
          HA_VERSION=$(grep '"homeassistant"' hacs.json | head -1 | sed 's/.*"homeassistant"\s*:\s*"\([^"]*\)".*/\1/')
          echo "HA_VERSION=${HA_VERSION}" >> $GITHUB_OUTPUT
          echo "Home Assistant version: ${HA_VERSION}"

      - name: Cache Home Assistant virtual environment
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .local/ha-venv
          key: ha-venv-${{ runner.os }}-py313-ha${{ steps.ha_version.outputs.HA_VERSION }}-${{ hashFiles('pyproject.toml', 'uv.lock', 'requirements.txt', 'hacs.json') }}
          restore-keys: |
            ha-venv-${{ runner.os }}-py313-ha${{ steps.ha_version.outputs.HA_VERSION }}-
            ha-venv-${{ runner.os }}-py313-

      - name: Install dependencies
        run: bash script/setup/bootstrap

      - name: Run tests
        run: bash script/test -v --tb=short
